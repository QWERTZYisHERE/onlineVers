<!DOCTYPE html>
<html lang="de">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Pixelify+Sans:wght@400..700&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <script>(function () { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Baseldeutsch</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: "Manrope", sans-serif;
            font-weight: bold;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            max-width: 393px;
            margin: 0 auto;
            width: 100%;
            height: 100dvh;
            color: var(--text);
        }

        .top-bar {
            background: var(--bg);
            height: 30px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .map-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            overflow: hidden;
            order: 1;
            animation: mapFloat 8s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes mapFloat {
            0% {
                transform: perspective(1000px) rotateX(2.2deg) rotateY(-2.6deg) rotateZ(-1.4deg);
            }

            50% {
                transform: perspective(1000px) rotateX(-1.8deg) rotateY(2.6deg) rotateZ(1.4deg);
            }

            100% {
                transform: perspective(1000px) rotateX(2.2deg) rotateY(-2.6deg) rotateZ(-1.4deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .map-area {
                animation: none;
            }
        }

        .bottom-nav {
            order: 2;
        }

        .map-area svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 43% 42%;
        }

        .map-area svg.zoomed {
            transform: scale(2.6);
        }

        #marker1 {
            cursor: pointer;
        }


        /* Speech bubble — fixed overlay, independent of the map's zoom & float */
        .map-bubble {
            position: fixed;
            z-index: 60;
            width: 250px;
            pointer-events: none;
            transform: translate(-50%, -100%) scale(0);
            transform-origin: 50% 0%;
            /* Disappear with a plain ease so the scale can't overshoot below 0
               (a "back" curve would dip negative and briefly mirror the bubble) */
            transition: transform 0.22s ease-in;
            margin-top: 7%;
        }

        .map-bubble.visible {
            transform: translate(-50%, -100%) scale(1);
            pointer-events: auto;
            cursor: pointer;
            /* Springy overshoot only while appearing */
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 7%;
        }

        .map-bubble svg {
            width: 100%;
            height: auto;
            display: block;
        }



        .bottom-nav {
            background: var(--bg);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            border-top: 3px solid var(--border);
            z-index: 100;
        }

        .nav-btn {
            width: 52px;
            height: 52px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        /* â”€â”€ Map SVG color theming â”€â”€ */
        #map-svg path[fill="#F77B4F"] {
            fill: var(--map-extrude);
        }

        #map-svg path[fill="#DBC8C2"] {
            fill: var(--map-fill);
        }

        #map-svg path[fill="#FFF369"] {
            fill: var(--map-highlight);
        }

        #map-svg path[stroke-width="5"] {
            stroke: var(--map-border);
        }

        #map-svg circle:not(#circle1) {
            fill: var(--map-lock-bg);
        }

        #map-svg path[fill="#303348"] {
            fill: var(--map-lock-ring);
        }

        #map-svg path[stroke-width="4"] {
            stroke: var(--map-lock-shackle);
        }

        /* ── Marker ── */
        #circle1 {
            fill: var(--map-extrude);
        }

        #marker1 path[fill='#AFF6F9'] {
            fill: var(--light);
        }

        /* â”€â”€ Speech bubble â”€â”€ */
        #bubble1 path[fill="#44869A"] {
            fill: var(--accent-light);
        }

        #bubble1 path[fill="#8CD0D3"] {
            fill: #303348;
        }

        /* ── First-time intro overlay ── */
        .intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: none;
            max-width: 393px;
            margin: 0 auto;
        }

        .intro-overlay.visible {
            display: flex;
        }

        .intro-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 32px;
            overflow-y: auto;
        }

        .intro-image {
            width: 100%;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 28px;
            flex-shrink: 0;
            margin-top: 30%;
        }

        .intro-text {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.35;
            color: var(--text);
            text-align: justify;
        }

        .intro-highlight {
            color: var(--accent-light);
        }

        .intro-next {
            margin-top: auto;
            align-self: flex-end;
            background: var(--accent-light);
            border: solid var(--border-nav);
            border-width: 5px;
            border-radius: 40px;
            color: #fff;
            font-family: "Manrope", sans-serif;
            font-size: 26px;
            font-weight: 700;
            padding: 16px 44px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.12));
        }

        .intro-next:active {
            filter: brightness(0.9);
        }

        /* ── First-lesson hint arrow ── */
        .lesson-hint {
            position: fixed;
            top: 38%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            animation: hintBounce 0.9s ease-in-out infinite;
        }

        .lesson-hint.visible {
            display: flex;
        }

        .lesson-hint-arrow {
            width: 46px;
            height: 62px;
        }

        .lesson-hint-text {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent);
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 14px;
        }

        @keyframes hintBounce {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-22px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .lesson-hint {
                animation: none;
            }
        }

        .page-title {
            font-size: 42px;
            font-weight: 800;
            color: var(--text);
            padding: 18px 30px 14px;
            flex-shrink: 0;
            max-height: 120px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease,
                max-height 0.4s ease, padding 0.4s ease;
        }

        /* Hide the title (and collapse its space) while the map is zoomed in */
        .page-title.hidden {
            transform: translateY(-120%);
            opacity: 0;
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
    </style>
</head>

        <div class="intro-content">
            <img class="intro-image" src="image.png" alt="Basel am Rhein">
            <p class="intro-text">
                Basel ist die Stadt der Museen, aber auch bekannt für ihre lebendige Kulturszene. Nicht nur das,
                aber wie man in der Schweiz so kennt, hat es eine eigene Dialektsprache:
                <br><span class="intro-highlight">Baseldeutsch</span>
            </p>
            <button class="intro-next" onclick="dismissIntro()">Weiter</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let zoomed = false;

        function toggleMarker(event) {
            event.stopPropagation();
            hideLessonHint();
            if (zoomed) {
                // Already zoomed in → open the lesson
                navigateTo('lektion1.html');
                return;
            }
            zoomed = true;
            document.getElementById('map-svg').classList.add('zoomed');
            document.getElementById('marker1').classList.add('active');
            document.getElementById('pageTitle').classList.add('hidden');
            // Place the teaser bubble above the marker once the zoom has settled
            setTimeout(showBubble, 450);
        }

        function showBubble() {
            if (!zoomed) return;
            const bubble = document.getElementById('bubble1');
            const rect = document.getElementById('marker1').getBoundingClientRect();
            bubble.style.left = (rect.left + rect.width / 2) + 'px';
            bubble.style.top = (rect.top + rect.height * 2.5) + 'px';
            bubble.classList.add('visible');
        }

        /* ── First-time onboarding ── */
        function dismissIntro() {
            localStorage.setItem('baselIntroSeen', '1');
            document.getElementById('introOverlay').classList.remove('visible');
            showLessonHint();
        }

        function showLessonHint() {
            const hint = document.getElementById('lessonHint');
            const marker = document.getElementById('marker1');
            const rect = marker.getBoundingClientRect();
            // Center the arrow horizontally on the marker, sitting just above it
            hint.style.left = (rect.left + rect.width / 2) + 'px';
            hint.style.top = (rect.top - 58) + 'px';
            hint.classList.add('visible');
        }

        function hideLessonHint() {
            document.getElementById('lessonHint').classList.remove('visible');
        }

        if (!localStorage.getItem('baselIntroSeen')) {
            document.getElementById('introOverlay').classList.add('visible');
        }

        function unzoom() {
            if (!zoomed) return;
            zoomed = false;
            document.getElementById('map-svg').classList.remove('zoomed');
            document.getElementById('marker1').classList.remove('active');
            document.getElementById('bubble1').classList.remove('visible');
            document.getElementById('pageTitle').classList.remove('hidden');
        }
    </script>

<!DOCTYPE html>
<html lang="de">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Pixelify+Sans:wght@400..700&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <script>(function () { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Baseldeutsch</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: "Manrope", sans-serif;
            font-weight: bold;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            max-width: 393px;
            margin: 0 auto;
            width: 100%;
            height: 100dvh;
            color: var(--text);
        }

        .top-bar {
            background: var(--bg);
            height: 30px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .map-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            overflow: hidden;
            order: 1;
            animation: mapFloat 8s ease-in-out infinite;
            will-change: transform;
        }

        @keyframes mapFloat {
            0% {
                transform: perspective(1000px) rotateX(2.2deg) rotateY(-2.6deg) rotateZ(-1.4deg);
            }

            50% {
                transform: perspective(1000px) rotateX(-1.8deg) rotateY(2.6deg) rotateZ(1.4deg);
            }

            100% {
                transform: perspective(1000px) rotateX(2.2deg) rotateY(-2.6deg) rotateZ(-1.4deg);
            }
        }


        .bottom-nav {
            order: 2;
        }

        .map-area svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 43% 42%;
        }

        .map-area.bubble-open {
            animation-play-state: paused;
        }

        .map-area svg.zoomed {
            transform: scale(2.6);
        }

        #marker1 {
            cursor: pointer;
        }


        /* Speech bubble — fixed overlay, independent of the map's zoom & float */
        .map-bubble {
            position: fixed;
            z-index: 60;
            width: 250px;
            pointer-events: none;
            transform: translate(-50%, -100%) scale(0);
            transform-origin: 50% 0%;
            /* Disappear with a plain ease so the scale can't overshoot below 0
               (a "back" curve would dip negative and briefly mirror the bubble) */
            transition: transform 0.22s ease-in;
            margin-top: 10px;
        }

        .map-bubble.visible {
            transform: translate(-50%, -100%) scale(1);
            pointer-events: auto;
            cursor: pointer;
            /* Springy overshoot only while appearing */
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 10px;
        }

        #bubble1{
            margin-top: 40px;
        }

        .map-bubble svg {
            width: 100%;
            height: auto;
            display: block;
        }



        .bottom-nav {
            background: var(--bg);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            border-top: 3px solid var(--border);
            z-index: 100;
        }

        .nav-btn {
            width: 52px;
            height: 52px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 5px;
        }

        /* â”€â”€ Map SVG color theming â”€â”€ */
        #map-svg path[fill="#F77B4F"] {
            fill: var(--map-extrude);
        }

        #map-svg path[fill="#DBC8C2"] {
            fill: var(--map-fill);
        }

        #map-svg path[fill="#FFF369"] {
            fill: var(--map-highlight);
        }

        #map-svg path[stroke-width="5"] {
            stroke: var(--map-border);
        }

        #map-svg circle:not(#circle1) {
            fill: var(--map-lock-bg);
        }

        #map-svg path[fill="#303348"] {
            fill: var(--map-lock-ring);
        }

        #map-svg path[stroke-width="4"] {
            stroke: var(--map-lock-shackle);
        }

        /* ── Marker ── */
        #circle1 {
            fill: var(--map-extrude);
        }

        #marker1 path[fill='#AFF6F9'] {
            fill: var(--light);
        }

        /* â”€â”€ Speech bubble â”€â”€ */
        #bubble1 path[fill="#44869A"] {
            fill: var(--accent-light);
        }

        #bubble1 path[fill="#8CD0D3"] {
            fill: #303348;
        }

        /* Level 2 unlocked → its bubble turns orange like level 1 */
        #bubble2.unlocked path[fill="#C19C8F"] {
            fill: var(--accent-light);
        }

        /* ── First-time intro overlay ── */
        .intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: none;
            max-width: 393px;
            margin: 0 auto;
        }

        .intro-overlay.visible {
            display: flex;
        }

        .intro-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 32px;
            overflow-y: auto;
        }

        .intro-image {
            width: 100%;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 28px;
            flex-shrink: 0;
            margin-top: 30%;
        }

        .intro-text {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.35;
            color: var(--text);
            text-align: justify;
        }

        .intro-highlight {
            color: var(--accent-light);
        }

        .intro-next {
            margin-top: auto;
            align-self: flex-end;
            background: var(--accent-light);
            border: solid var(--border-nav);
            border-width: 5px;
            border-radius: 40px;
            color: #fff;
            font-family: "Manrope", sans-serif;
            font-size: 26px;
            font-weight: 700;
            padding: 16px 44px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.12));
        }

        .intro-next:active {
            filter: brightness(0.9);
        }

        /* ── First-lesson hint arrow ── */
        .lesson-hint {
            position: fixed;
            top: 38%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            animation: hintBounce 0.9s ease-in-out infinite;
        }

        .lesson-hint.visible {
            display: flex;
        }

        .lesson-hint-arrow {
            width: 46px;
            height: 62px;
        }

        .lesson-hint-text {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent);
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 14px;
        }

        @keyframes hintBounce {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-22px);
            }
        }


        .page-title {
            font-size: 42px;
            font-weight: 800;
            color: var(--text);
            padding: 14px 30px 14px;
            flex-shrink: 0;
            max-height: 170px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease,
                max-height 0.4s ease, padding 0.4s ease;
            line-height: 45px;
        }

        /* Hide the title (and collapse its space) while the map is zoomed in */
        .page-title.hidden {
            transform: translateY(-120%);
            opacity: 0;
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
    </style>
</head>

                <br><span class="intro-highlight">Baseldeutsch</span>
            </p>

        </div>

    <script src="script.js"></script>
    <script>
        let zoomed = false;

        // Pin centres in the map's SVG coordinate space (viewBox 342 × 456)
        const VBW = 342, VBH = 456;
        const PINS = {
            marker1: { cx: 146, cy: 181.625, bubble: 'bubble1', lesson: 'lektion1.html' },
            marker2: { cx: 150, cy: 78.625, bubble: 'bubble2' },
            marker3: { cx: 255, cy: 100.625, bubble: 'bubble3' },
            marker4: { cx: 81, cy: 233.625, bubble: 'bubble4' }
        };
        let activePin = null;

        // Reflect progress: once level 1 is done, the top-left pin becomes an
        // unlocked orange "2" pin and its bubble turns orange.
        function applyProgress() {
            if (!localStorage.getItem('level1Complete')) return;
            const g = document.getElementById('marker2');
            if (g) {
                g.innerHTML =
                    '<circle cx="150" cy="78.625" r="18.5" style="fill: var(--map-extrude)" stroke="#303348" stroke-width="5"/>' +
                    '<text x="150" y="78.625" text-anchor="middle" dominant-baseline="central" ' +
                    'font-family="Manrope, sans-serif" font-weight="800" font-size="24" fill="white">2</text>';
            }
            const b = document.getElementById('bubble2');
            if (b) b.classList.add('unlocked');
            // Highlight the level-2 region yellow (CSS maps #FFF369 → --map-highlight)
            const region = document.getElementById('level2Region');
            if (region) region.setAttribute('fill', '#FFF369');
        }
        applyProgress();

        // Lesson 1 pin (unlocked): zoom in, then open the lesson on a second tap
        function toggleMarker(event) {
            event.stopPropagation();
            hideLessonHint();
            if (zoomed && activePin === 'marker1') {
                navigateTo('lektion1.html');
                return;
            }
            openPin('marker1');
        }

        // Locked pins: zoom in like lesson 1; a second tap zooms back out
        function toggleLock(event, markerId) {
            event.stopPropagation();
            hideLessonHint();
            if (zoomed && activePin === markerId) { unzoom(); return; }
            openPin(markerId);
        }

        const ZOOM = 2.6;   // must match the .map-area svg.zoomed scale in CSS
        function openPin(markerId) {
            resetZoom();
            const p = PINS[markerId];
            const svg = document.getElementById('map-svg');
            // Pick a transform-origin so the pin lands in the map's centre after
            // scaling: O = (M - s·P) / (1 - s), with M = 0.5 (centre) per axis.
            const ox = (ZOOM * (p.cx / VBW) - 0.5) / (ZOOM - 1) * 100;
            const oy = (ZOOM * (p.cy / VBH) - 0.5) / (ZOOM - 1) * 100;
            svg.style.transformOrigin = ox + '% ' + oy + '%';
            svg.classList.add('zoomed');
            document.querySelector('.map-area').classList.add('bubble-open');
            document.getElementById('pageTitle').classList.add('hidden');
            if (markerId === 'marker1') document.getElementById('marker1').classList.add('active');
            zoomed = true;
            activePin = markerId;
            // Place the teaser bubble above the pin once the zoom has settled
            setTimeout(function () { showBubble(markerId); }, 450);
        }

        function showBubble(markerId) {
            if (!zoomed || activePin !== markerId) return;
            const bubble = document.getElementById(PINS[markerId].bubble);
            const rect = document.getElementById(markerId).getBoundingClientRect();
            bubble.style.left = (rect.left + rect.width / 2) + 'px';
            bubble.style.top = (rect.top + rect.height * 2.5) + 'px';
            bubble.classList.add('visible');
        }

        function resetZoom() {
            zoomed = false;
            activePin = null;
            document.getElementById('map-svg').classList.remove('zoomed');
            document.getElementById('marker1').classList.remove('active');
            ['bubble1', 'bubble2', 'bubble3', 'bubble4'].forEach(function (id) {
                var b = document.getElementById(id);
                if (b) b.classList.remove('visible');
            });
            document.querySelector('.map-area').classList.remove('bubble-open');
        }

        /* ── First-time onboarding ── */
        function dismissIntro() {
            localStorage.setItem('baselIntroSeen', '1');
            document.getElementById('introOverlay').classList.remove('visible');
            showLessonHint();
        }

        function showLessonHint() {
            const hint = document.getElementById('lessonHint');
            const marker = document.getElementById('marker1');
            const rect = marker.getBoundingClientRect();
            // Center the arrow horizontally on the marker, sitting just above it
            hint.style.left = (rect.left + rect.width / 2) + 'px';
            hint.style.top = (rect.top - 58) + 'px';
            hint.classList.add('visible');
        }

        function hideLessonHint() {
            document.getElementById('lessonHint').classList.remove('visible');
        }

        if (!localStorage.getItem('baselIntroSeen')) {
            document.getElementById('introOverlay').classList.add('visible');
        }

        function unzoom() {
            if (!zoomed) return;
            resetZoom();
            document.getElementById('pageTitle').classList.remove('hidden');
        }
    </script>

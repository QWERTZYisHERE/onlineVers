<!DOCTYPE html>
<html lang="de">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Pixelify+Sans:wght@400..700&display=swap"
    rel="stylesheet">
  <meta charset="UTF-8">
  <script>(function () { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Lektion 3</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Manrope", sans-serif;
      font-weight: bold;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      max-width: 393px;
      margin: 0 auto;
      width: 100%;
      height: 100dvh;
      color: var(--text);
      position: relative;
    }

    /* ── Top bar: info + close ── */
    .lesson-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 30px 24px 0;
      flex-shrink: 0;
    }

    .info-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--accent-light);
      border: solid var(--border-nav);
      border-width: 4px;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.12));
    }

    .info-btn:active {
      filter: brightness(0.9);
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      width: 35px;
      height: 35px;
    }

    /* ── Body ── */
    .lesson-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 24px;
    }

    .rhine-img {
      width: 90%;
      object-fit: cover;
      border-radius: 6px;
    }

    .word {
      font-size: 40px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      user-select: none;
    }

    /* "yy" quick-up: vertical stretch from the baseline (like the letter-scaler app) */
    .word .v {
      color: var(--vowel);
      display: inline-block;
      transform-origin: bottom center;
      animation: yStretch calc(1.8s * var(--anim-scale, 1)) ease-in-out infinite;
    }

    .word .v>span {
      display: inline-block;
      transform-origin: bottom center;
      animation: yStretchInner calc(1.8s * var(--anim-scale, 1)) ease-in-out infinite;
    }

    @keyframes yStretch {
      0%, 55%, 100% { transform: scaleY(1); }
      75% { transform: scaleY(2); }
    }

    @keyframes yStretchInner {
      0%, 55%, 100% { transform: scaleY(1); }
      75% { transform: scaleY(0.8); }
    }

    /* ── Mic ── */
    .mic-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-btn svg {
      width: 120px;
      height: auto;
    }

    @keyframes pulse {

      0%,
      100% {
        filter: drop-shadow(0 0 0px rgba(69, 173, 79, 0.5));
      }

      50% {
        filter: drop-shadow(0 0 12px rgba(69, 173, 79, 0.85));
      }
    }

    .mic-btn.listening svg {
      animation: pulse 1s infinite;
    }

    .feedback {
      height: 24px;
      font-size: calc(18px * var(--font-scale));
      font-weight: 700;
      text-align: center;
    }

    .feedback.correct {
      color: var(--result-correct);
    }

    .feedback.wrong {
      color: var(--result-wrong);
    }

    /* ── Typed-answer fallback (no speech support) ── */
    .type-controls {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .type-form {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }

    .type-input {
      flex: 1;
      min-width: 0;
      font-family: "Manrope", sans-serif;
      font-size: calc(18px * var(--font-scale));
      font-weight: 700;
      color: var(--text);
      background: var(--bg-card);
      border: solid var(--border);
      border-width: 2px 2px 5px 2px;
      border-radius: 30px;
      padding: 13px 20px;
      outline: none;
    }

    .type-input::placeholder {
      color: var(--text-muted);
      font-weight: 600;
    }

    .check-btn {
      flex-shrink: 0;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: solid var(--light);
      border-width: 2px 2px 5px 2px;
      background: var(--accent-light);
      color: #fff;
      font-size: 26px;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Theory bubble (styled to match bubble.svg) ── */
    .info-bubble {
      position: absolute;
      top: 110px;
      left: 16px;
      right: 16px;
      background: var(--accent-light);
      color: #fff;
      border: 4px solid var(--border-nav);
      border-radius: 6px;
      padding: 20px 16px;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.4;
      z-index: 20;
      transform: scale(0);
      transform-origin: 32px -18px;
      transition: transform 0.22s ease-in;
      filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.12));
      font-size: calc(20px * var(--font-scale));
    }

    .info-bubble.visible {
      transform: scale(1);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .info-bubble::before {
      content: '';
      position: absolute;
      top: -25px;
      left: 24px;
      width: 0;
      height: 0;
      border-right: 28px solid transparent;
      border-bottom: 26px solid var(--border-nav);
    }

    .info-bubble::after {
      content: '';
      position: absolute;
      top: -18px;
      left: 27px;
      width: 0;
      height: 0;
      border-right: 23px solid transparent;
      border-bottom: 21px solid var(--accent-light);
    }

    .info-bubble .hl {
      color: var(--light);
      font-weight: 800;
    }
  </style>
</head>

<body>

  <div class="lesson-top">
    <button class="info-btn" id="infoBtn" onclick="toggleInfo(event)">i</button>
    <button class="close-btn" onclick="navigateTo('index.html')" aria-label="Schliessen">
      <svg viewBox="0 0 41 45" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.5 37.5L20.2119 20.5M37.5 3.5L20.2119 20.5M20.2119 20.5L3.5 3.5M20.2119 20.5L37.5 37.5" stroke="#A29595" stroke-width="7"
          stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <!-- Theory bubble (toggled by the info button) -->
  <div class="info-bubble" id="infoBubble">
    Der Rhein ist Basels <span>Lebensader.</span> Aktivitäten im, am und auf dem Rhein sind bei den
    Baslerinnen und Basler sehr beliebt.
  </div>

  <div class="lesson-body">
    <img class="rhine-img" src="image.png" alt="Der Rhein in Basel">

    <div class="word">Rh<span class="v"><span>yy</span></span></div>

    <div class="feedback" id="feedback"></div>

    <button class="voice-btn" id="micBtn" onclick="startVoice()" aria-label="Sprechen"></button>
  </div>

  <script src="script.js"></script>
  <script>
    // Accepted pronunciations of the Baseldeutsch "Rhyy"
    const accepted = [ 'rii', 'nii', 'mii', 'lie', 'rhii', 'rie', 'ri', 'reh', 'ree', 'rhi', 'rhie' ];
    let isListening = false;
    let recognition = null;
    let solved = false;

    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    // iOS Safari ignores `continuous`/`interimResults` and breaks if a recognition
    // object is reused after stopping — so we detect iOS and build a fresh, simple
    // instance for every attempt.
    const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    function buildRecognition() {
      const rec = new SpeechRecognitionAPI();
      rec.lang = 'de-DE';   // standard German recognises the dialect sounds as e.g. "rii"
      // "Rhyy" is a single short syllable, which engines easily cut off or miss.
      // On iOS keep it simple; elsewhere stream partial guesses to catch it early.
      rec.continuous = isIOS ? false : true;
      rec.interimResults = isIOS ? false : true;
      rec.maxAlternatives = 5;

      rec.onresult = function (e) {
        // Gather every transcript (interim + final, all alternatives) since last event
        const guesses = [];
        let hasFinal = false;
        for (let r = e.resultIndex; r < e.results.length; r++) {
          const res = e.results[r];
          if (res.isFinal) hasFinal = true;
          for (let i = 0; i < res.length; i++) guesses.push(res[i].transcript.trim());
        }
        // Accept as soon as anything matches — even a partial guess
        if (guesses.some(matches) || hasFinal) {
          setListening(false);
          try { rec.stop(); } catch (_) {}
          checkAnswer(guesses);
        }
      };
      rec.onerror = function (e) {
        setListening(false);
        const fb = document.getElementById('feedback');
        if (e.error === 'no-speech') {
          fb.textContent = 'Nüt ghört – nomol versueche';
        } else if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          fb.textContent = 'Mikrofon isch blockiert – i de Browser-Iistellige erlaube';
        } else if (e.error === 'audio-capture') {
          fb.textContent = 'Kei Mikrofon gfunde';
        } else if (e.error === 'aborted') {
          return;   // user stopped / restarted — no message
        } else {
          fb.textContent = 'Spracherkennig het nid klappt – nomol versueche';
        }
        fb.className = 'feedback wrong';
      };
      rec.onend = function () { setListening(false); };
      return rec;
    }

    function setListening(val) {
      isListening = val;
      const btn = document.getElementById('micBtn');
      if (val) startVoiceViz(btn);
      else stopVoiceViz(btn);
    }

    buildVoiceBars(document.getElementById('micBtn'));

    function startVoice() {
      if (solved) return;
      const fb = document.getElementById('feedback');
      // Mic needs a secure (HTTPS) origin on every browser, iOS Safari included
      if (!window.isSecureContext) {
        fb.textContent = 'Mikrofon bruucht HTTPS – App über https:// öffne';
        fb.className = 'feedback wrong';
        return;
      }
      if (!SpeechRecognitionAPI) {
        fb.textContent = 'Dä Browser cha kei Spraach erkenne – nimm Safari oder Chrome';
        fb.className = 'feedback wrong';
        return;
      }
      // Tapping while listening stops the current attempt
      if (isListening) {
        try { recognition.stop(); } catch (_) {}
        return;
      }

      fb.textContent = '';
      fb.className = 'feedback';
      // Fresh instance each attempt — iOS Safari won't reliably restart a used one
      recognition = buildRecognition();
      setListening(true);
      try {
        recognition.start();
      } catch (e) {
        setListening(false);
        fb.textContent = 'Het nid gstartet – nomol versueche';
        fb.className = 'feedback wrong';
      }
    }

    function normalize(str) {
      return str.toLowerCase()
        .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue')
        .replace(/[^a-z]/g, '');
    }

    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      if (!m) return n;
      if (!n) return m;
      const dp = Array.from({ length: m + 1 }, function (_, i) { return [i]; });
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = a[i - 1] === b[j - 1]
            ? dp[i - 1][j - 1]
            : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
      return dp[m][n];
    }

    function matches(guess) {
      const ns = normalize(guess);
      if (!ns) return false;
      // Any guess containing the long-i sound counts (the core of "Rhyy").
      // Standard German spells it "ie" (e.g. "rie"), so accept that too.
      if (ns.indexOf('ie') !== -1 || ns.indexOf('ii') !== -1) return true;
      return accepted.some(function (w) {
        // Accept within ~40% edit distance — the "r" in "Rhyy" is often misheard
        const tol = Math.max(1, Math.ceil(w.length * 0.4));
        return ns === w || ns.indexOf(w) !== -1 || w.indexOf(ns) !== -1
          || levenshtein(ns, w) <= tol;
      });
    }

    function checkAnswer(guesses) {
      if (solved) return;
      const fb = document.getElementById('feedback');
      const ok = guesses.some(matches);
      if (ok) {
        solved = true;
        fb.textContent = 'Richtig! 🎉';
        fb.className = 'feedback correct';
        setTimeout(function () { navigateTo('lektion4.html'); }, 1400);
      } else {
        fb.textContent = 'Versuich\'s nomol';
        fb.className = 'feedback wrong';
      }
    }

    function toggleInfo(e) {
      e.stopPropagation();
      document.getElementById('infoBubble').classList.toggle('visible');
    }

    document.addEventListener('click', function () {
      document.getElementById('infoBubble').classList.remove('visible');
    });
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="de">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Pixelify+Sans:wght@400..700&display=swap"
    rel="stylesheet">
  <meta charset="UTF-8">
  <script>(function () { var t = localStorage.getItem('theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Fertig</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Manrope", sans-serif;
      font-weight: bold;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      max-width: 393px;
      margin: 0 auto;
      width: 100%;
      height: 100dvh;
      color: var(--text);
    }

    .top-bar {
      height: 30px;
      flex-shrink: 0;
    }

    /* ── Completion view (mirrors the exercise results screen) ── */
    .results-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 40px;
    }

    .results-title-wrap {
      position: relative;
      align-self: flex-start;
      margin-bottom: 24px;
    }

    .results-title {
      font-size: 43px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 0;
      letter-spacing: -0.01em;
      max-width: 300px;
    }

    .results-title .letter {
      display: inline-block;
      animation: wave 0.6s ease-in-out;
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .results-subtitle {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-muted);
      max-width: 300px;
      line-height: 1.3;
    }

    /* ── Sparkles ── */
    .sparkle {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transform: scale(0);
      animation: sparkle-twinkle 1.6s ease-in-out infinite;
    }

    .sparkle svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .sparkle svg path {
      fill: var(--light);
      stroke: var(--border-nav);
      stroke-width: 3;
      stroke-linejoin: round;
    }

    @keyframes sparkle-twinkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="top-bar"></div>

  <div class="results-content">
    <div class="results-title-wrap" id="resultsTitleWrap">
      <div class="results-title" id="resultsTitle"></div>
    </div>
    <div class="results-subtitle">Du hesch alli Ufgoobene abgschlosse!</div>
    <button class="spec-btn2" onclick="navigateTo('index.html')">Zur Karte</button>
  </div>

  <script src="script.js"></script>
  <script>
    function esc(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function animateTitle(title) {
      const titleEl = document.getElementById('resultsTitle');
      let letterIndex = 0;
      titleEl.innerHTML = title.split('').map(function (char) {
        if (char === ' ') return '<div style="flex-basis: 100%; height: 0;"></div>';
        return '<span class="letter" style="animation-delay: ' + (letterIndex++ * 0.08) + 's">' + esc(char) + '</span>';
      }).join('');
    }

    function celebrate() {
      const wrap = document.getElementById('resultsTitleWrap');
      const star = '<svg viewBox="0 0 28 28"><path d="M14 1C15 9 19 13 27 14C19 15 15 19 14 27C13 19 9 15 1 14C9 13 13 9 14 1Z"/></svg>';
      const positions = [
        { top: '-20px', left: '-16px', size: 26, delay: 0 },
        { top: '30px', left: '-24px', size: 17, delay: 0.35 },
        { top: '-6px', left: '40px', size: 13, delay: 0.7 },
        { bottom: '2px', right: '-18px', size: 26, delay: 0.18 },
        { bottom: '40px', right: '-8px', size: 17, delay: 0.5 },
        { bottom: '-8px', right: '46px', size: 13, delay: 0.85 }
      ];
      positions.forEach(function (p) {
        const el = document.createElement('div');
        el.className = 'sparkle';
        el.style.width = p.size + 'px';
        el.style.height = p.size + 'px';
        if (p.top) el.style.top = p.top;
        if (p.left) el.style.left = p.left;
        if (p.bottom) el.style.bottom = p.bottom;
        if (p.right) el.style.right = p.right;
        el.style.animationDelay = p.delay + 's';
        el.innerHTML = star;
        wrap.appendChild(el);
      });
    }

    animateTitle('Glückwunsch!');
    celebrate();
  </script>

</body>

</html>

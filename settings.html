  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Einstellungen</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: "Manrope", sans-serif;
      font-weight: bold;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      max-width: 393px;
      margin: 0 auto;
      width: 100%;
      height: 100dvh;
      color: var(--text);
      font-size: 24px;
      font-style: normal;
      line-height: normal;
    }

    .top-bar {
      background: var(--bg);
      height: 30px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .page-title {
      font-size: 42px;
      font-weight: 800;
      color: var(--text);
      padding: 18px 30px 14px;
      flex-shrink: 0;
    }

    .settings-card {
      margin: 10px 20px;
      background: var(--bg-card);
      border: 4px solid var(--border-nav);
      border-radius: 20px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.07));
      padding: 20px 24px 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .setting-label {
      font-size: calc(20px * var(--font-scale));
      font-weight: 700;
      color: var(--text);
    }

    /* ── Toggle switch ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-switch {
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-track {
      display: block;
      width: 52px;
      height: 30px;
      background: var(--border);
      border-radius: 15px;
      transition: background 0.25s;
      position: relative;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      background: var(--bg);
      border-radius: 50%;
      transition: transform 0.25s;
    }

    .toggle-switch input:checked+.toggle-track {
      background: var(--accent);
    }

    .toggle-switch input:checked+.toggle-track .toggle-thumb {
      transform: translateX(22px);
    }

    /* ── Sliders ── */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-light);
      border: solid var(--border-nav);
      border-width: 4px;
      cursor: pointer;
      margin-top: -12px;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.12));
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      border: solid var(--border-nav);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: var(--border-nav);
      border-radius: 2px;
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      background: var(--border-nav);
      border-radius: 2px;
    }

    .spacer {
      flex: 1;
    }

    .bottom-nav {
      background: var(--bg);
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      border-top: 4px solid var(--border);
      z-index: 100;
    }

    .nav-btn {
      width: 52px;
      height: 52px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>


  <div class="page-title">Einstellungen</div>

  <div class="settings-card">
    <div class="setting-row">
      <label class="setting-label" for="fontSize">Schriftgrösse</label>
      <input type="range" id="fontSize" min="1" max="5" step="1" value="3">
    </div>
    <div class="setting-row">
      <label class="setting-label" for="animSpeed">Animationslänge</label>
      <input type="range" id="animSpeed" min="1" max="5" step="1" value="3">
    </div>

  <script>
    const fontSizes = ['14px', '16px', '18px', '20px', '22px'];
    const animSpeeds = ['0.08s', '0.15s', '0.22s', '0.35s', '0.5s'];

    function loadSettings() {
      const fs = parseInt(localStorage.getItem('fontSize') || '3');
      const as = parseInt(localStorage.getItem('animSpeed') || '3');
      document.getElementById('fontSize').value = fs;
      document.getElementById('animSpeed').value = as;
    }

    document.getElementById('fontSize').addEventListener('input', function () {
      localStorage.setItem('fontSize', this.value);
      applyFontScale();   // update the whole page immediately
    });

    document.getElementById('animSpeed').addEventListener('input', function () {
      localStorage.setItem('animSpeed', this.value);
      applyAnimScale();   // update the --anim-scale variable immediately
    });

    // ── Theme toggle (only if present — it may be commented out) ──
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
      themeToggle.checked = (localStorage.getItem('theme') === 'dark');
      themeToggle.addEventListener('change', function () {
        const theme = this.checked ? 'dark' : 'light';
        localStorage.setItem('theme', theme);
        document.documentElement.setAttribute('data-theme', theme);
      });
    }

    loadSettings();
    setupHint('hint', 'hintSettings');
  </script>
